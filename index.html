<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>优惠券需求读取器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.5;padding:20px}
.container{max-width:1400px;margin:0 auto}
h1{font-size:24px;font-weight:700;margin-bottom:4px}
.subtitle{color:#666;font-size:13px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-title{font-size:15px;font-weight:600;margin-bottom:12px;color:#333}
.upload-area{border:2px dashed #c0c6d0;border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:all .2s}
.upload-area:hover,.upload-area.dragover{border-color:#4361ee;background:#f8f9ff}
.upload-area svg{width:40px;height:40px;color:#4361ee;margin-bottom:8px}
.upload-area p{color:#666;font-size:14px}
.upload-area .hint{font-size:12px;color:#999;margin-top:4px}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#0ea472}
.btn-outline{background:transparent;border:1px solid #d0d5dd;color:#555}.btn-outline:hover{background:#f5f5f5}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.coupon-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px}
.coupon-card{border:1px solid #e5e7eb;border-radius:8px;padding:14px;background:#fafbfc}
.coupon-card .code{font-size:16px;font-weight:700;color:#4361ee;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.coupon-card .code .badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.badge-h{background:#dbeafe;color:#1d4ed8}.badge-f{background:#fef3c7;color:#92400e}
.coupon-card .fr{display:flex;justify-content:space-between;padding:3px 0;font-size:12.5px;border-bottom:1px solid #f0f0f0}
.coupon-card .fr:last-child{border-bottom:none}
.coupon-card .fr .l{color:#888}.coupon-card .fr .v{font-weight:500;text-align:right;max-width:65%;word-break:break-all}
.table-wrap{overflow-x:auto;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
th{background:#f1f3f5;font-weight:600;text-align:left;padding:8px 10px;position:sticky;top:0;border-bottom:2px solid #d0d5dd}
td{padding:6px 10px;border-bottom:1px solid #eee}
tr:hover td{background:#f8f9ff}
td input{width:60px;padding:3px 6px;border:1px solid #ddd;border-radius:4px;font-size:12px;text-align:center}
td input:focus{outline:none;border-color:#4361ee}
td input.wide{width:90px}
.status{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.status.show{display:block}
.status-ok{background:#d1fae5;color:#065f46}.status-err{background:#fee2e2;color:#991b1b}
.format-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-left:8px}
.format-1{background:#e0e7ff;color:#3730a3}.format-2{background:#fce7f3;color:#9d174d}
.th-copy{display:inline-block;margin-left:6px;padding:0 4px;font-size:10px;background:#dbeafe;border:none;border-radius:3px;cursor:pointer;color:#3730a3}
.th-copy:hover{background:#4361ee;color:#fff}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h1>🎫 优惠券需求读取器 <span style="font-size:14px;color:#999;font-weight:400">v3</span></h1>
<p class="subtitle">自动识别 3 种格式，关键词智能匹配字段</p>

<div class="card">
<div class="upload-area" id="dropZone">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
<p>点击或拖拽上传 CSV 文件</p>
<p class="hint">支持列式 / 键值对 / 列键值（Boombastrip）三种格式自动识别</p>
</div>
<input type="file" id="fileInput" accept=".csv,.txt" style="display:none">
</div>

<div id="statusBox" class="status"></div>

<div id="parsedSection" class="hidden">
<div class="card">
<div class="card-title">📋 解析结果 <span id="formatTag" class="format-tag"></span></div>
<div class="coupon-cards" id="couponCards"></div>
</div>

<div class="card">
<div class="card-title">📊 输出表格</div>
<div class="actions" style="margin-bottom:12px">
<button class="btn btn-success" onclick="exportXlsx()"> 导出 XLSX</button>
<button class="btn btn-outline" onclick="exportCsv()"> 导出 CSV</button>
</div>
<div class="table-wrap"><table id="outputTable"></table></div>
</div>
</div>
</div>

<script>
let coupons = [];

// ========== CSV Parser ==========
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row = [], field = '', inQuotes = false, i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') { if (i+1 < text.length && text[i+1] === '"') { field += '"'; i += 2; } else { inQuotes = false; i++; } }
      else { field += c; i++; }
    } else {
      if (c === '"') { inQuotes = true; i++; }
      else if (c === ',') { row.push(field); field = ''; i++; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && i+1 < text.length && text[i+1] === '\n') i++;
        row.push(field); field = ''; rows.push(row); row = []; i++;
      } else { field += c; i++; }
    }
  }
  row.push(field); rows.push(row);
  const maxLen = Math.max(...rows.map(r => r.length));
  rows.forEach(r => { while(r.length < maxLen) r.push(''); });
  return rows;
}

// ========== Keyword Field Matching ==========
const FIELD_RULES = [
  {key:'code', kw:['promo code name','coupon code','public code','code name'], exact:['coupon id']},
  {key:'currency', kw:['currency'], exact:['currency']},
  {key:'product', kw:['eligible product','product line','product type'], exact:['products','product']},
  {key:'type', kw:['coupon type'], exact:['type']},
  {key:'budget', kw:['budget','cost center'], exact:['budget']},
  {key:'locale', kw:['locale','language'], exact:['locale']},
  {key:'device', kw:['device','platform'], exact:['devices']},
  {key:'aidsid', kw:['aidsid','aid sid','blacklist','block list'], exact:['blacklist']},
  {key:'release', kw:['release date','start date','launch date'], exact:['release date']},
  {key:'expire', kw:['expire date','expiry date','end date'], exact:['expire date']},
  {key:'validity', kw:['validity period','validity'], exact:['validity']},
  {key:'sku', kw:['eligible sku','product description','applicable','route'], exact:[]},
  {key:'payment', kw:['eligible payment','payment method'], exact:[]},
  {key:'quota', kw:['quota','initial qty','initial quantity'], exact:['quantity']},
  {key:'mechanism', kw:['mechanism','discount rule','offer rule'], exact:['value']},
  {key:'newuser', kw:['new user','new customer'], exact:[]},
  {key:'peruid', kw:['per uid','usage limit','usage per','per account'], exact:['usage']},
  {key:'channel', kw:['channel','whitelist'], exact:['channel']},
  {key:'description', kw:['description','remark','note'], exact:['description']},
  {key:'quantity', kw:['quantity','used limit','claim limit'], exact:['quantity']},
];

function matchField(fieldName) {
  const lower = fieldName.toLowerCase().trim();
  if (!lower) return null;
  for (const rule of FIELD_RULES) { if (rule.exact && rule.exact.some(e => lower === e)) return rule.key; }
  for (const rule of FIELD_RULES) { if (rule.kw.some(k => lower.includes(k))) return rule.key; }
  return null;
}

// ========== Format Detection ==========
function detectFormat(rows) {
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    if (rows[i].filter(c => c.trim() === 'Coupon ID').length >= 2) return 'column';
  }
  for (let i = 0; i < Math.min(rows.length, 15); i++) {
    const pcn = rows[i].filter(c => c.trim() === 'Promo Code Name').length;
    if (pcn >= 2) return 'columnkv';
  }
  let kvCount = 0;
  for (let i = 0; i < Math.min(rows.length, 30); i++) {
    const f = (rows[i][0] || '').trim();
    if (f && matchField(f)) kvCount++;
  }
  if (kvCount >= 3) return 'keyvalue';
  return null;
}

// ========== Number Parser ==========
function parseNum(s) {
  if (!s) return '';
  s = s.trim();
  if (/[Kk]$/.test(s)) return String(Math.round(parseFloat(s.replace(/[Kk]$/, '').replace(/[.,]/g, '')) * 1000));
  if ((s.match(/\./g) || []).length > 1) return s.replace(/\./g, '');
  if ((s.match(/,/g) || []).length > 1) return s.replace(/,/g, '');
  return s.replace(/[.,]/g, '');
}

// ========== Value/Mechanism Parser ==========
function parseValue(str) {
  const r = {currency: '', discountDollar: '', minspendDollar: '', discountPct: '', capDollar: ''};
  if (!str) return r;
  const curM = str.match(/(S\$|RM|US\$|Rp|\$)/i);
  if (curM) {
    const sym = curM[1].toUpperCase();
    if (sym === 'S$' || sym === '$') r.currency = 'SGD';
    else if (sym === 'RM') r.currency = 'MYR';
    else if (sym === 'US$') r.currency = 'USD';
    else if (sym === 'RP') r.currency = 'IDR';
    else r.currency = sym;
  }
  function clean(s) { return s ? parseNum(s.replace(/[,.]$/, '')) : ''; }
  const C = '(?:S\\$|RM|US\\$|Rp|\\$)', N = '([\\d.,]+[Kk]?)';
  // 1) Pct with OFF: "10% OFF (max Rp200.000)"
  const pctM = str.match(new RegExp('(\\d+(?:\\.\\d+)?)\\s*%\\s*OFF\\s*\\(?[^)]*?(?:max|up\\s+to|capped)\\s+' + C + '?\\s*' + N, 'i'));
  if (pctM) { r.discountPct = pctM[1] + '%'; r.capDollar = clean(pctM[2]); return r; }
  // 2) Pct "up to": "7% up to Rp188K OFF min spend Rp600K"
  const upToM = str.match(new RegExp('(\\d+(?:\\.\\d+)?)\\s*%\\s*up\\s+to\\s+' + C + '?\\s*' + N + '(?:\\s*OFF)?.*?(?:min\\.?\\s*spend|min\\s+spend)\\s*' + C + '?\\s*' + N, 'is'));
  if (upToM) { r.discountPct = upToM[1] + '%'; r.capDollar = clean(upToM[2]); r.minspendDollar = clean(upToM[3]); return r; }
  // 3) Fixed: "Rp188.000 OFF ... min spend Rp2,500,000"
  const fixM = str.match(new RegExp(C + '\\s*' + N + '\\s*OFF.*?(?:min\\.?\\s*spend|min\\s+spend)\\s*' + C + '?\\s*' + N, 'is'));
  if (fixM) { r.discountDollar = clean(fixM[1]); r.minspendDollar = clean(fixM[2]); return r; }
  return r;
}

// ========== Validity Text Parser (Format 2) ==========
function parseValidity(text) {
  const r = {startDate: '', endDate: '', tagTime: '', topupQty: '', totalQty: '', _everyDay: ''};
  if (!text) return r;
  const t = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const months = {jan: '1', feb: '2', mar: '3', apr: '4', may: '5', jun: '6', jul: '7', aug: '8', sep: '9', oct: '10', nov: '11', dec: '12'};
  // Date range: "12 Aug 12PM - 18 Oct EOD"
  const rangeM = t.match(/(\d{1,2})\s+([A-Za-z]{3,})\s*(\d{1,2}[:\s]*[APap]?[Mm]?)?\s*[-–]\s*(\d{1,2})\s+([A-Za-z]{3,})\s*(EOD|\d{1,2}[:\s]*[APap]?[Mm]?)?/i);
  if (rangeM) {
    const m1 = months[rangeM[2].toLowerCase().substring(0, 3)];
    const m2 = months[rangeM[5].toLowerCase().substring(0, 3)];
    r.startDate = m1 ? m1 + '/' + rangeM[1] + '/2026' : '';
    r.endDate = m2 ? m2 + '/' + rangeM[4] + '/2026' : '';
    if (rangeM[3]) r.tagTime = rangeM[3].replace(/\s+/g, '').toLowerCase().replace(':00', '');
  }
  // Drop time
  const dropM = t.match(/[Dd]rop\s*(?:at)?\s*(\d{1,2}[:\s]*[APap]?[Mm]?)/);
  if (dropM) r.tagTime = dropM[1].replace(/\s+/g, '').toLowerCase().replace(':00', '');
  // Topup qty
  const topupM = t.match(/(?:top\s*up|topup)\s*[:\s]*(\d+)\s*(?:qty|quantity)?/i);
  if (topupM) r.topupQty = topupM[1];
  // Total qty
  const totalM = t.match(/(?:total|total\s*qty)\s*[:\s]*(\d+)/i);
  if (totalM) r.totalQty = totalM[1];
  // Every day
  const everyM = t.match(/every\s+(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)/i);
  if (everyM) r._everyDay = everyM[1];
  return r;
}

// ========== Date Range Parser (Format 3: "5-8 August") ==========
function parseRangeDate(str) {
  if (!str) return {startDate: '', endDate: '', tagTime: ''};
  const months = {jan: '1', feb: '2', mar: '3', apr: '4', may: '5', jun: '6', jul: '7', aug: '8', sep: '9', oct: '10', nov: '11', dec: '12'};
  let m;
  m = str.match(/(\d{1,2})\s*[-–]\s*(\d{1,2})\s+([A-Za-z]{3,})/);
  if (m) {
    const mon = months[m[3].toLowerCase().substring(0, 3)] || '';
    if (mon) return {startDate: mon + '/' + m[1] + '/2026', endDate: mon + '/' + m[2] + '/2026', tagTime: ''};
  }
  m = str.match(/(\d{1,2})\s+([A-Za-z]{3,})\s*,?\s*(\d{1,2}\s*[APap]?[Mm]?)/);
  if (m) {
    const mon = months[m[2].toLowerCase().substring(0, 3)] || '';
    if (mon) return {
      startDate: mon + '/' + m[1] + '/2026',
      endDate: mon + '/' + m[1] + '/2026',
      tagTime: m[3] ? m[3].replace(/\s+/g, '').toLowerCase().replace(':00', '') : ''
    };
  }
  return {startDate: '', endDate: '', tagTime: ''};
}

// ========== Quantity Parser (Format 3) ==========
function parseQuantityText(str) {
  if (!str) return {total: 0, initialQty: 0, topupStart: '', topupTimes: 0, topupQty: 0};
  const dateEntries = [];
  const entryRegex = /(\d{1,2})\s+([A-Za-z]{3,})\s*[=:]\s*(\d+)/gi;
  let m;
  while ((m = entryRegex.exec(str)) !== null) {
    dateEntries.push({day: parseInt(m[1]), month: m[2], qty: parseInt(m[3])});
  }
  if (dateEntries.length > 0) {
    const months = {jan: '1', feb: '2', mar: '3', apr: '4', may: '5', jun: '6', jul: '7', aug: '8', sep: '9', oct: '10', nov: '11', dec: '12'};
    const initialQty = dateEntries[0].qty;
    const total = dateEntries.reduce(function(s, d) { return s + d.qty; }, 0);
    const topupTimes = Math.max(0, dateEntries.length - 1);
    let topupStart = '', topupQty = 0;
    if (dateEntries.length > 1) {
      const td = dateEntries[1];
      const mon = months[td.month.toLowerCase().substring(0, 3)] || '';
      if (mon) topupStart = mon + '/' + td.day + '/2026';
      topupQty = td.qty;
    }
    // End date = last date in breakdown
    const lastD = dateEntries[dateEntries.length - 1];
    const lastMon = months[lastD.month.toLowerCase().substring(0,3)] || '';
    const endDate = lastMon ? lastMon + '/' + lastD.day + '/2026' : '';
    return {total: total, initialQty: initialQty, topupStart: topupStart, topupTimes: topupTimes, topupQty: topupQty, endDate: endDate};
  }
  const n = parseInt(str);
  const val = isNaN(n) ? 0 : n;
  return {total: val, initialQty: val, topupStart: '', topupTimes: 0, topupQty: 0, endDate: ''};
}

// ========== Date Math ==========
function parseDateMDY(str) {
  const m = str.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (!m) return null;
  return new Date(+m[3], +m[1] - 1, +m[2]);
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmtDate(d) { return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear(); }
function calcEndDate(ts, interval, times) {
  const s = parseDateMDY(ts);
  if (!s) return '';
  return fmtDate(addDays(s, interval * times));
}

// ========== Auto-calculate topupTimes from dates ==========
function autoCalcTopupTimes() {
  coupons.forEach(function(c) {
    if (c._autoInterval) {
      const dayMap = {sunday: 0, monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5, saturday: 6};
      if (dayMap[c._autoInterval.toLowerCase()] !== undefined) c.topupInterval = 7;
    }
    const s = parseDateMDY(c.startDate || c.topupDateStart);
    const e = parseDateMDY(c._expireDate);
    if (s && e && c.topupInterval > 0) {
      const diff = Math.round((e - s) / (1000 * 60 * 60 * 24));
      c.topupTimes = Math.floor(diff / c.topupInterval);
    }
  });
}

// ========== Format 1: Column-based Extractor ==========
function extractColumnFormat(rows) {
  let hri = -1;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    if (rows[i].some(function(c) { return c.trim() === 'Coupon ID'; })) { hri = i; break; }
  }
  if (hri < 0) throw new Error('Format 1: 未找到 Coupon ID 表头');
  const hr = rows[hri];
  const months = {jan: '1', feb: '2', mar: '3', apr: '4', may: '5', jun: '6', jul: '7', aug: '8', sep: '9', oct: '10', nov: '11', dec: '12'};
  const dateM = hr[0].trim().match(/(\d{1,2})[-\s]([a-zA-Z]{3})/);
  const startDate = dateM ? (months[dateM[2].toLowerCase().substring(0, 3)] || '') + '/' + dateM[1] + '/2026' : hr[0].trim();

  const groups = [];
  for (let i = 1; i < hr.length; i++) {
    if (hr[i].trim() === 'Coupon ID' && i + 1 < hr.length) groups.push({fc: i, vc: i + 1});
  }
  if (!groups.length) throw new Error('Format 1: 未找到数据列');

  return groups.map(function(g) {
    const fields = {};
    for (let r = hri + 1; r < rows.length; r++) {
      const fn = (rows[r][g.fc] || '').trim();
      const key = matchField(fn);
      if (key) fields[key] = (rows[r][g.vc] || '').trim();
    }
    return buildCouponFromFields(fields, startDate);
  }).filter(function(c) { return c && c.code; });
}

function buildCouponFromFields(fields, startDate) {
  const val = parseValue(fields.mechanism || '');
  const rp = fields.release ? parseDateTimeStr(fields.release) : {date: '', time: ''};
  const v = fields.validity ? parseValidity(fields.validity) : {};
  const pl = (fields.product || '').toLowerCase();
  const product = fields.product ? (pl.includes('flight') ? 'FLIGHT' : 'HOTEL') : '';
  const ccM = (fields.budget || '').match(/\((\d+)\)|(\d{3,})/);

  return {
    code: fields.code || '',
    currency: fields.currency || val.currency || '',
    product: product,
    startDate: startDate || v.startDate || rp.date || '',
    costCenter: ccM ? (ccM[1] || ccM[2]) : '',
    tag: v.tagTime || rp.time || '',
    sku: fields.sku || fields.product || '',
    usagePerAccount: fields.peruid || '',
    paymentLimit: fields.payment || '',
    deviceLimit: fields.device || '',
    newUserOnly: fields.newuser || '',
    travelDateLimit: '',
    discountDollar: val.discountDollar,
    minspendDollar: val.minspendDollar,
    discountPct: val.discountPct,
    capDollar: val.capDollar,
    initialQty: parseInt(fields.quota) || 0,
    topupDateStart: v.startDate || '',
    topupInterval: 7,
    topupQty: parseInt(v.topupQty) || 0,
    topupTimes: 0,
    _releaseDate: fields.release || '',
    _expireDate: fields.expire || v.endDate || '',
    _mechanism: fields.mechanism || '',
    _locale: fields.locale || '',
    _aidsid: fields.aidsid || '',
    _validity: fields.validity || '',
    _totalQty: parseInt(v.totalQty) || 0,
    _channel: fields.channel || '',
    _description: fields.description || '',
    _autoInterval: v._everyDay || null,
  };
}

function parseDateTimeStr(str) {
  const m = str.match(/(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s*(\d{1,2}:\d{2}\s*[APap][Mm])?/);
  if (!m) return {date: str, time: ''};
  return {date: parseInt(m[1]) + '/' + parseInt(m[2]) + '/' + m[3], time: m[4] ? m[4].replace(/\s/g, '').toLowerCase().replace(':00', '') : ''};
}

// ========== Format 2: Key-Value Extractor ==========
function extractKeyValueFormat(rows) {
  const couponBlocks = [];
  let currentBlock = {};
  let productHint = '', desc = '';

  for (let i = 0; i < rows.length; i++) {
    const c0 = (rows[i][0] || '').trim(), c1 = (rows[i][1] || '').trim();
    if (!c0 && !c1) {
      if (Object.keys(currentBlock).length >= 3) { currentBlock._hint = productHint; currentBlock._desc = desc; couponBlocks.push(currentBlock); }
      currentBlock = {};
      continue;
    }
    if (!c1 && /^(flights?|hotels?)/i.test(c0)) { productHint = c0; continue; }
    if (!c1 && !matchField(c0)) { desc = c0; continue; }
    if (/coupon\s*drop/i.test(c0) && !c1) continue;
    const key = matchField(c0);
    if (key && c1) {
      if (key === 'product') {
        const pl = c1.toLowerCase();
        currentBlock.product = pl.includes('flight') ? 'FLIGHT' : (pl.includes('hotel') ? 'HOTEL' : '');
        currentBlock.sku = c1;
      } else { currentBlock[key] = c1; }
    }
  }
  if (Object.keys(currentBlock).length >= 3) { currentBlock._hint = productHint; currentBlock._desc = desc; couponBlocks.push(currentBlock); }

  return couponBlocks.map(function(b) {
    const val = parseValue(b.mechanism || '');
    const v = b.validity ? parseValidity(b.validity) : {};
    let product = b.product || '';
    if (!product && b._hint) {
      const h = b._hint.toLowerCase();
      product = h.includes('flight') ? 'FLIGHT' : (h.includes('hotel') ? 'HOTEL' : '');
    }
    const ccM = (b.budget || '').match(/(\d{3,})/);
    const topupQty = parseInt(v.topupQty) || 0;
    const totalQty = parseInt(v.totalQty) || parseInt(b.quota) || 0;
    const initialQty = topupQty || parseInt(b.quota) || totalQty;

    return {
      code: b.code || '',
      currency: val.currency || '',
      product: product,
      startDate: v.startDate || '',
      costCenter: ccM ? ccM[1] : '',
      tag: v.tagTime || '',
      sku: b.sku || b._desc || '',
      usagePerAccount: b.peruid || '',
      paymentLimit: '',
      deviceLimit: b.device || '',
      newUserOnly: '',
      travelDateLimit: '',
      discountDollar: val.discountDollar,
      minspendDollar: val.minspendDollar,
      discountPct: val.discountPct,
      capDollar: val.capDollar,
      initialQty: initialQty,
      topupDateStart: v.startDate || '',
      topupInterval: 7,
      topupQty: topupQty,
      topupTimes: 0,
      _releaseDate: v.startDate || '',
      _expireDate: v.endDate || '',
      _mechanism: b.mechanism || '',
      _locale: '',
      _aidsid: b.aidsid || '',
      _validity: b.validity || '',
      _totalQty: totalQty,
      _channel: b.channel || '',
      _description: b.description || '',
      _autoInterval: v._everyDay || null,
    };
  }).filter(function(c) { return c && c.code; });
}

// ========== Format 3: Column Key-Value Extractor ==========
function extractColumnKVFormat(rows) {
  const allCoupons = [];

  // Pre-scan: find ALL section header rows
  const headerRows = new Set();
  for (let ri = 0; ri < rows.length; ri++) {
    let pcnCount = 0;
    for (let j = 0; j < rows[ri].length; j++) {
      if (rows[ri][j].trim() === 'Promo Code Name') pcnCount++;
    }
    if (pcnCount >= 2) headerRows.add(ri);
  }

  for (let ri = 0; ri < rows.length; ri++) {
    const pcnCols = [];
    for (let j = 0; j < rows[ri].length; j++) {
      if (rows[ri][j].trim() === 'Promo Code Name') pcnCols.push(j);
    }
    if (pcnCols.length < 2) continue;

    const step = pcnCols[1] - pcnCols[0];
    const groups = pcnCols.map(function(fc) { return {fc: fc, vc: fc + 1}; });

    // Date context
    const dateContexts = groups.map(function(g) {
      for (let dr = ri - 1; dr >= Math.max(0, ri - 4); dr--) {
        const dv = (rows[dr][g.fc] || '').trim();
        if (dv && /\d/.test(dv) && !matchField(dv)) return dv;
      }
      return '';
    });

    // Section product type
    let sectionProduct = '';
    for (let dr = ri - 1; dr >= Math.max(0, ri - 5); dr--) {
      const title = (rows[dr][0] || '').trim();
      if (/^FLIGHT/i.test(title)) { sectionProduct = 'FLIGHT'; break; }
      if (/^HOTEL/i.test(title)) { sectionProduct = 'HOTEL'; break; }
    }

    for (let gi = 0; gi < groups.length; gi++) {
      const g = groups[gi];
      const fields = {};
      let qtyRaw = '';

      // Code from header
      fields.code = (rows[ri][g.vc] || '').trim();

      for (let r = ri + 1; r < rows.length; r++) {
        if (headerRows.has(r) && r !== ri) break;
        const fieldName = (rows[r][g.fc] || '').trim();
        if (!fieldName) {
          const contVal = (rows[r][g.vc] || '').trim();
          if (contVal && qtyRaw) qtyRaw += ' ' + contVal;
          continue;
        }
        const fieldKey = matchField(fieldName);
        if (!fieldKey) continue;

        const value = (rows[r][g.vc] || '').trim();

        if (fieldKey === 'quantity' || fieldKey === 'quota') {
          qtyRaw = value;
          for (let r2 = r + 1; r2 < rows.length; r2++) {
            if (headerRows.has(r2)) break;
            const nextField = (rows[r2][g.fc] || '').trim();
            if (nextField && matchField(nextField)) break;
            const nextVal = (rows[r2][g.vc] || '').trim();
            if (nextVal) qtyRaw += ' ' + nextVal;
            else if (!nextField) continue;
            else break;
          }
          fields.quantity = qtyRaw;
        } else {
          fields[fieldKey] = value;
        }

        if (fieldKey === 'product') {
          fields.sku = value;
          const pl = value.toLowerCase();
          if (pl.includes('flight')) fields._productType = 'FLIGHT';
          else if (pl.includes('hotel')) fields._productType = 'HOTEL';
          else fields._productType = sectionProduct;
        }
      }

      if (!fields.code) continue;
      if (!fields._productType) fields._productType = sectionProduct;

      const dateCtx = dateContexts[gi] || '';
      const vDate = parseRangeDate(fields.validity || dateCtx);
      const qtyInfo = parseQuantityText(fields.quantity || '');
      const val = parseValue(fields.mechanism || '');
      const ccM = (fields.budget || '').match(/(\d{3,})/);

      allCoupons.push({
        code: fields.code,
        currency: val.currency || '',
        product: fields._productType || '',
        startDate: vDate.startDate || '',
        costCenter: ccM ? ccM[1] : '',
        tag: vDate.tagTime || '',
        sku: fields.sku || '',
        usagePerAccount: fields.peruid || '',
        paymentLimit: '',
        deviceLimit: fields.device || '',
        newUserOnly: '',
        travelDateLimit: '',
        discountDollar: val.discountDollar,
        minspendDollar: val.minspendDollar,
        discountPct: val.discountPct,
        capDollar: val.capDollar,
        initialQty: qtyInfo.initialQty,
        topupDateStart: qtyInfo.topupStart || vDate.startDate || '',
        topupInterval: 1,
        topupQty: qtyInfo.topupQty || 0,
        topupTimes: qtyInfo.topupTimes || 0,
        _releaseDate: vDate.startDate || '',
        _expireDate: qtyInfo.endDate || vDate.endDate || '',
        _mechanism: fields.mechanism || '',
        _locale: '',
        _aidsid: fields.aidsid || '',
        _validity: fields.validity || dateCtx,
        _totalQty: qtyInfo.total,
        _channel: fields.channel || '',
        _description: fields.description || '',
        _autoInterval: null,
      });
    }
  }
  return allCoupons;
}

// ========== UI ==========
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const statusBox = document.getElementById('statusBox');
dropZone.addEventListener('click', function() { fileInput.click(); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', function(e) { if (e.target.files.length) handleFile(e.target.files[0]); });

function showStatus(msg, type) { statusBox.className = 'status show status-' + type; statusBox.textContent = msg; }

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const rows = parseCSV(e.target.result);
      const format = detectFormat(rows);
      if (!format) throw new Error('无法识别 CSV 格式');

      if (format === 'column') coupons = extractColumnFormat(rows);
      else if (format === 'columnkv') coupons = extractColumnKVFormat(rows);
      else coupons = extractKeyValueFormat(rows);

      if (!coupons.length) throw new Error('未解析到任何优惠券');

      autoCalcTopupTimes();

      const fmtLabel = format === 'column' ? '列式 (Format 1)' : format === 'columnkv' ? '列键值 (Format 3)' : '键值对 (Format 2)';
      const fmtClass = format === 'keyvalue' ? 'format-2' : 'format-1';
      document.getElementById('formatTag').className = 'format-tag ' + fmtClass;
      document.getElementById('formatTag').textContent = fmtLabel;

      showStatus('✅ 解析 ' + coupons.length + ' 个优惠券: ' + coupons.map(function(c) { return c.code; }).join(', '), 'ok');
      renderAll();
      document.getElementById('parsedSection').classList.remove('hidden');
    } catch (err) {
      showStatus('❌ ' + err.message, 'err');
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function renderAll() { renderCouponCards(); renderOutputTable(); }

function renderCouponCards() {
  document.getElementById('couponCards').innerHTML = coupons.map(function(c) {
    return '<div class="coupon-card">' +
      '<div class="code">' + esc(c.code) + ' <span class="badge ' + (c.product === 'HOTEL' ? 'badge-h' : 'badge-f') + '">' + (c.product === 'HOTEL' ? 'Hotel' : c.product === 'FLIGHT' ? 'Flight' : c.product || '?') + '</span></div>' +
      '<div class="fr"><span class="l">Currency</span><span class="v">' + esc(c.currency) + '</span></div>' +
      '<div class="fr"><span class="l">SKU</span><span class="v">' + esc(c.sku) + '</span></div>' +
      '<div class="fr"><span class="l">Mechanism</span><span class="v">' + esc(c._mechanism) + '</span></div>' +
      '<div class="fr"><span class="l">Discount</span><span class="v">' + (c.discountDollar ? '$' + c.discountDollar : '') + (c.discountPct || '') + '</span></div>' +
      '<div class="fr"><span class="l">Min Spend</span><span class="v">' + (c.minspendDollar ? '$' + c.minspendDollar : '') + '</span></div>' +
      '<div class="fr"><span class="l">Cap</span><span class="v">' + (c.capDollar ? '$' + c.capDollar : '') + '</span></div>' +
      '<div class="fr"><span class="l">Initial Qty</span><span class="v">' + c.initialQty + '</span></div>' +
      '<div class="fr"><span class="l">Device</span><span class="v">' + esc(c.deviceLimit) + '</span></div>' +
      '<div class="fr"><span class="l">Blacklist</span><span class="v">' + esc(c._aidsid) + '</span></div>' +
      '<div class="fr"><span class="l">Validity</span><span class="v">' + esc(c._validity || c._releaseDate) + '</span></div>' +
      (c._channel ? '<div class="fr"><span class="l">Channel</span><span class="v">' + esc(c._channel) + '</span></div>' : '') +
    '</div>';
  }).join('');
}

const OUT_COLS = [
  {key: 'code', label: 'Code', edit: false},
  {key: 'currency', label: 'Curr.', edit: false},
  {key: 'product', label: 'Product', edit: false},
  {key: 'startDate', label: 'Start', edit: false},
  {key: '_endDate', label: 'End', edit: false},
  {key: 'costCenter', label: 'Cost Center', edit: false},
  {key: 'tag', label: 'Tag', edit: true, type: 'text'},
  {key: 'sku', label: 'sku', edit: true, type: 'text', wide: true},
  {key: 'usagePerAccount', label: 'Usage/acct', edit: true, type: 'text', wide: true},
  {key: 'paymentLimit', label: 'pay limit', edit: true, type: 'text'},
  {key: 'deviceLimit', label: 'Device', edit: true, type: 'text'},
  {key: 'newUserOnly', label: 'New user', edit: true, type: 'text'},
  {key: 'travelDateLimit', label: 'Travel date', edit: true, type: 'text'},
  {key: 'discountDollar', label: 'Discount$', edit: true, type: 'text'},
  {key: 'minspendDollar', label: 'Minspend$', edit: true, type: 'text'},
  {key: 'discountPct', label: 'Discount%', edit: true, type: 'text'},
  {key: 'capDollar', label: 'Cap$', edit: true, type: 'text'},
  {key: 'initialQty', label: 'Init qty', edit: true, type: 'number'},
  {key: 'topupDateStart', label: 'Topup start', edit: true, type: 'text', wide: true},
  {key: 'topupInterval', label: 'Interval', edit: true, type: 'number'},
  {key: 'topupQty', label: 'Topup qty', edit: true, type: 'number'},
  {key: 'topupTimes', label: 'Times', edit: true, type: 'number'},
];

function renderOutputTable() {
  coupons.forEach(function(c) {
    if (c._expireDate && c.topupInterval <= 1) {
      c._endDate = c._expireDate;
    } else {
      c._endDate = calcEndDate(c.topupDateStart, parseInt(c.topupInterval) || 0, parseInt(c.topupTimes) || 0);
    }
  });
  var html = '<thead><tr>' + OUT_COLS.map(function(c, i) {
    return '<th>' + c.label + '<button class="th-copy" onclick="copyColumn(' + i + ')" title="复制整列">⧈</button></th>';
  }).join('') + '</tr></thead><tbody>';
  coupons.forEach(function(c, ci) {
    html += '<tr>';
    OUT_COLS.forEach(function(col) {
      var val = c[col.key] !== undefined ? c[col.key] : '';
      if (col.edit) {
        html += '<td><input type="' + col.type + '" value="' + esc(String(val)) + '" data-ci="' + ci + '" data-key="' + col.key + '" onchange="onCellChange(this)"' + (col.wide ? ' class="wide"' : '') + '></td>';
      } else {
        html += '<td>' + esc(String(val)) + '</td>';
      }
    });
    html += '</tr>';
  });
  document.getElementById('outputTable').innerHTML = html;
}

function onCellChange(el) {
  var ci = +el.dataset.ci, key = el.dataset.key;
  coupons[ci][key] = el.value;
  coupons[ci]._endDate = (coupons[ci]._expireDate && coupons[ci].topupInterval <= 1) ? coupons[ci]._expireDate : calcEndDate(coupons[ci].topupDateStart, parseInt(coupons[ci].topupInterval) || 0, parseInt(coupons[ci].topupTimes) || 0);
  renderOutputTable();
}

function copyColumn(colIdx) {
  var key = OUT_COLS[colIdx].key;
  var vals = coupons.map(function(c) {
    if (key === '_endDate') return (c._expireDate && c.topupInterval <= 1) ? c._expireDate : calcEndDate(c.topupDateStart, parseInt(c.topupInterval) || 0, parseInt(c.topupTimes) || 0);
    return c[key] !== undefined ? String(c[key]) : '';
  });
  navigator.clipboard.writeText(vals.join('\n')).then(function() {
    var btns = document.querySelectorAll('.th-copy');
    btns[colIdx].textContent = '✓'; btns[colIdx].style.background = '#10b981'; btns[colIdx].style.color = '#fff';
    setTimeout(function() { btns[colIdx].textContent = '⧈'; btns[colIdx].style.background = ''; btns[colIdx].style.color = ''; }, 1000);
  });
}

// ========== Export ==========
function buildExportData() {
  var h = ['Code', 'Curr.', 'Product', 'Start', 'End', 'Cost Center', 'Tag', 'sku',
    'Usage per account', 'payment limit', 'Device limit', 'New user only', 'Traveldate limit',
    'Discount$', 'Minspend$', 'Discount%', 'Cap$', 'Initial qty',
    'date start to top up', 'top up interval', 'top up qty per time', 'top up times'];
  var r = coupons.map(function(c) {
    var end = (c._expireDate && c.topupInterval <= 1) ? c._expireDate : calcEndDate(c.topupDateStart, parseInt(c.topupInterval) || 0, parseInt(c.topupTimes) || 0);
    return [c.code, c.currency, c.product, c.startDate, end, c.costCenter, c.tag,
      c.sku, c.usagePerAccount, c.paymentLimit, c.deviceLimit, c.newUserOnly,
      c.travelDateLimit, c.discountDollar, c.minspendDollar, c.discountPct, c.capDollar,
      c.initialQty, c.topupDateStart, c.topupInterval, c.topupQty, c.topupTimes];
  });
  return {headers: h, rows: r};
}

function exportXlsx() {
  var data = buildExportData();
  var ws = XLSX.utils.aoa_to_sheet([data.headers].concat(data.rows));
  ws['!cols'] = data.headers.map(function(h, i) { return {wch: Math.min(Math.max(h.length, ...data.rows.map(function(r) { return String(r[i] || '').length; })) + 2, 30)}; });
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet2');
  XLSX.writeFile(wb, 'coupon_output.xlsx');
}

function exportCsv() {
  var data = buildExportData();
  var all = [data.headers].concat(data.rows);
  var csv = all.map(function(r) { return r.map(function(v) { return '"' + String(v || '').replace(/"/g, '""') + '"'; }).join(','); }).join('\n');
  var blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'coupon_output.csv'; a.click();
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>
